name: Main Branch CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cubingkerala_test
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      CLIENT_ID: ci-test-client
      CLIENT_SECRET: ci-test-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cubingkerala_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push --skip-generate

      - name: Run unit & integration tests
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=github
        timeout-minutes: 15

      - name: Upload test coverage
        uses: codecov/codecov-action@v6
        if: always()
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-main
          path: playwright-report/
          retention-days: 30

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v42
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: "--prod"
          github-comment: true
          vercel-version: latest

      - name: Create deployment comment
        uses: actions/github-script@v9
        if: success()
        with:
          script: |
            const sha = context.sha;
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: `🚀 Successfully deployed to production!\n\n✅ All tests passed\n🌐 Production URL: ${{ steps.vercel-deploy.outputs.preview-url }}`
            })
