# Mirror upstream main → maintainer fork after every merge/push to main.
# Also runs on a schedule / manual dispatch: Dependabot auto-merge uses
# GITHUB_TOKEN, and GitHub does not fire push workflows for those merges.
# See AGENTS.md → "Maintainer fork sync".

name: Sync maintainer fork

on:
  push:
    branches: [main]
  # Catch-up when auto-merged Dependabot PRs skip push-triggered workflows.
  schedule:
    - cron: "15 * * * *" # hourly, offset from :00
  workflow_dispatch:

# Cross-repo push uses a PAT; default GITHUB_TOKEN cannot write to another repo.
permissions:
  contents: read

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    # Only run when a fork target is configured (repo variable).
    if: ${{ vars.SYNC_FORK_REPO != '' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: main
          # Do not persist GITHUB_TOKEN credentials — they override the PAT URL
          # and cause: "Permission ... denied to github-actions[bot]" on the fork.
          persist-credentials: false

      - name: Force-push main to fork
        env:
          GH_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
          FORK_REPO: ${{ vars.SYNC_FORK_REPO }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "SYNC_FORK_TOKEN secret is empty; skipping fork sync."
            exit 0
          fi

          # Belt-and-suspenders: drop any leftover github.com auth headers.
          git config --local --unset-all http.https://github.com/.extraheader || true

          echo "Syncing HEAD → ${FORK_REPO}:main"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git" \
            "HEAD:refs/heads/main"
          echo "Fork main updated."
