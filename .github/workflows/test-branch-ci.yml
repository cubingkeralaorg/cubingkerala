name: Test Branch CI/CD

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Prisma reads DATABASE_URL; map from test DB secret (fallback for repos with only DATABASE_URL)
      DATABASE_URL: ${{ secrets.POSTGRES_URL_TEST || secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify database URL secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is empty. Add a GitHub Actions secret named POSTGRES_URL_TEST (recommended) or DATABASE_URL."
            echo "Settings → Secrets and variables → Actions → New repository secret"
            echo "Use a separate Neon branch/database for CI test runs, not production."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push --skip-generate

      - name: Run unit & integration tests
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=github
        timeout-minutes: 15

      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-test
          path: playwright-report/
          retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          github-comment: false

      - name: Comment Preview URL
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const sha = context.payload.pull_request ? context.payload.pull_request.head.sha : context.sha;
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: `✅ Tests passed! Preview deployed to: ${{ steps.vercel-deploy.outputs.preview-url }}`
            })
